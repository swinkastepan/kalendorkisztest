<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Kalendorkisz</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    margin-top: 40px;
    background: #f5f5f5;
}

h1 {
    font-size: 40px;
}

input, button {
    font-size: 18px;
    padding: 10px;
    margin: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    cursor: pointer;
    background: #4CAF50;
    color: white;
}

#wynik {
    font-size: 24px;
    margin-top: 20px;
    font-weight: bold;
}

#grid {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 5px;
    margin: 30px auto;
    max-width: 800px;
}

.day {
    padding: 10px;
    background: white;
    border-radius: 6px;
    font-size: 14px;
}

.active {
    background: gold;
    font-weight: bold;
}

/* 🎬 VIDEO */
#videoContainer {
    display: none;
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    justify-content:center;
    align-items:center;
    z-index: 999;
    animation: fadeIn 0.4s;
}

video {
    width: 80%;
    border-radius: 10px;
}

@keyframes fadeIn {
    from {opacity:0;}
    to {opacity:1;}
}

footer {
    margin-top: 40px;
    font-size: 14px;
    color: gray;
}
</style>
</head>

<body>

<h1>📅 Kalendorkisz</h1>

<p>Wybierz datę:</p>
<input type="date" id="data">
<br>
<button onclick="przelicz()">Sprawdź</button>

<div id="wynik"></div>
<div id="grid"></div>

<!-- 🎬 VIDEO -->
<div id="videoContainer">
    <video id="secretVideo" controls>
        <source src="orkaeditto2.mp4" type="video/mp4">
        Twoja przeglądarka nie obsługuje wideo
    </video>
</div>

<footer>zrobione przez swinkastepan</footer>

<script>
const START = new Date("0001-01-01");

const months = ["mrożąc", "ciepłąc", "środnąc", "kolorąc", "kończąc"];
const weekdays = ["permulan","erta","dopo","durin","keskela","halvim","naidvara","samstag","alafia","festo"];

function getWeekLength(day) {
    if (day <= 30) return 10;
    else if (day <= 39) return 9;
    else if (day <= 47) return 8;
    else if (day <= 54) return 7;
    else if (day <= 60) return 6;
    else if (day <= 65) return 5;
    else if (day <= 69) return 4;
    else if (day <= 72) return 3;
    else return 2;
}

function przelicz() {
    const input = document.getElementById("data").value;
    if (!input) return alert("Wybierz datę!");

    const inputDate = new Date(input);
    const diff = Math.floor((inputDate - START) / (1000*60*60*24));

    const total = 74 * 5;
    const dayOfYear = ((diff % total) + total) % total;

    const monthIndex = Math.floor(dayOfYear / 74);
    const dayInMonth = (dayOfYear % 74) + 1;

    let d = dayInMonth;
    let currentDay = 1;
    let weekDayIndex = 0;

    while (true) {
        let weekLen = getWeekLength(currentDay);

        if (d <= weekLen) {
            weekDayIndex = d - 1;
            break;
        }

        d -= weekLen;
        currentDay += weekLen;
    }

    document.getElementById("wynik").innerText =
        `W Kalendorkiszu: ${weekdays[weekDayIndex]}, ${dayInMonth} dzień miesiąca ${months[monthIndex]}`;

    drawCalendar(dayInMonth);
}

function drawCalendar(activeDay) {
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    for (let i = 1; i <= 74; i++) {
        const div = document.createElement("div");
        div.className = "day";
        div.innerText = i;

        if (i === activeDay) {
            div.classList.add("active");
        }

        grid.appendChild(div);
    }
}

/* 🎬 EASTER EGG */
let spaceCount = 0;
let lastPress = 0;

document.addEventListener("keydown", (e) => {
    if (e.code === "Space") {
        const now = Date.now();

        if (now - lastPress > 1000) {
            spaceCount = 0;
        }

        spaceCount++;
        lastPress = now;

        if (spaceCount === 5) {
            showVideo();
            spaceCount = 0;
        }
    }
});

function showVideo() {
    const container = document.getElementById("videoContainer");
    const video = document.getElementById("secretVideo");

    container.style.display = "flex";
    video.currentTime = 0;
    video.play();
}

document.getElementById("secretVideo").addEventListener("ended", () => {
    document.getElementById("videoContainer").style.display = "none";
});
</script>

</body>
</html>
